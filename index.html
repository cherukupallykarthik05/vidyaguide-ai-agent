<!DOCTYPE html>
<html>
<head>
<title>VidyaGuide AI Agent</title>

<style>

body{
font-family: "Segoe UI", Arial;
background:#f4f6fa;
margin:0;
padding:0;
}

.header{
background:#1f3c88;
color:white;
padding:20px;
text-align:center;
}

.header h1{
margin:0;
}

.container{
width:900px;
margin:auto;
margin-top:30px;
}

.form-box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
margin-bottom:25px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#3b82f6;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.card h3{
margin-top:0;
color:#1f3c88;
}

.bar{
height:18px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.bar-fill{
height:100%;
}

.footer{
text-align:center;
margin-top:40px;
color:#777;
}

ul{
padding-left:20px;
}

</style>
</head>

<body>

<div class="header">
<h1>VidyaGuide AI Agent</h1>
<p>AI-Powered Resume Intelligence Platform</p>
</div>

<div class="container">

<div class="form-box">

<form id="resumeForm">

<input type="text" name="name" placeholder="Your Name" required>

<input type="file" name="file" required>

<input type="text" name="company" placeholder="Target Company" required>

<input type="text" name="role" placeholder="Job Role" required>

<button type="submit">Analyze Resume</button>

</form>

</div>

<div id="result"></div>

</div>

<div class="footer">
<p>© 2026 VidyaGuide AI Agent | Built by Cherukupally Karthik</p>
</div>

<script>

document.getElementById("resumeForm").onsubmit = async function(e){

e.preventDefault()

let formData=new FormData(this)

let result=document.getElementById("result")

result.innerHTML="Analyzing your resume..."

let response=await fetch("http://127.0.0.1:8000/analyze",{
method:"POST",
body:formData
})

let data=await response.json()

let score=data["ATS Score"]

let color="green"

if(score<=35){
color="red"
}
else if(score<=69){
color="orange"
}

let message=""

if(score>=70){
message="Your resume strongly matches the job requirements."
}
else{
message="Your resume partially matches the role requirements. Improving the suggested skills will increase your chances."
}

result.innerHTML=`

<div class="grid">

<div class="card">
<h3>Candidate Information</h3>
<p><b>Name:</b> ${data["Name"]}</p>
<p><b>Position Evaluated:</b> ${data["Role"]}</p>
<p><b>Target Company:</b> ${data["Company"]}</p>
</div>

<div class="card">
<h3>ATS Readiness Score</h3>
<h2 style="color:${color}">${score}%</h2>

<div class="bar">
<div class="bar-fill" style="width:${score}%; background:${color}"></div>
</div>

<p>${message}</p>
</div>

<div class="card">
<h3>✔ Strength Skills</h3>
<ul>
${data["Strengths"].map(s=>`<li>${s}</li>`).join("")}
</ul>
</div>

<div class="card">
<h3>⚠ Skills To Improve</h3>
<ul>
${data["Missing Skills"].map(s=>`<li>${s}</li>`).join("")}
</ul>
</div>

<div class="card">
<h3>💼 Suggested Job Roles</h3>
<ul>
${data["Role Suggestions"].map(r=>`<li>${r}</li>`).join("")}
</ul>
</div>

<div class="card">
<h3>🎯 Interview Questions</h3>
<ul>
${data["Interview Questions"].map(q=>`<li>${q}</li>`).join("")}
</ul>
</div>

<div class="card">
<h3>📈 Resume Improvement Suggestions</h3>
<ul>
${data["Suggestions"].map(s=>`<li>${s}</li>`).join("")}
</ul>
</div>

</div>

`

}

</script>

</body>
</html>
